AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: ValidateTrack backend - API Gateway + Lambda + DynamoDB
Globals:
  Function:
    Runtime: nodejs24.x
    Timeout: 10
    MemorySize: 128
    Environment:
      Variables:
        EQUIPMENT_TABLE:
          Ref: EquipmentTable
        DEVIATIONS_TABLE:
          Ref: DeviationsTable
Resources:
  EquipmentTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: ValidateTrack-Equipment
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
      - AttributeName: id
        AttributeType: S
      KeySchema:
      - AttributeName: id
        KeyType: HASH
  DeviationsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: ValidateTrack-Deviations
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
      - AttributeName: id
        AttributeType: S
      KeySchema:
      - AttributeName: id
        KeyType: HASH
  ValidateTrackApi:
    Type: AWS::Serverless::Api
    Properties:
      StageName: dev
      Cors:
        AllowMethods: '''GET,POST,PUT,DELETE,OPTIONS'''
        AllowHeaders: '''Content-Type'''
        AllowOrigin: '''*'''
  EquipmentFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src/handlers/equipment.handler
      CodeUri: EquipmentFunction
      Policies:
      - DynamoDBCrudPolicy:
          TableName:
            Ref: EquipmentTable
      Events:
        GetAll:
          Type: Api
          Properties:
            RestApiId:
              Ref: ValidateTrackApi
            Path: /equipment
            Method: GET
        GetOne:
          Type: Api
          Properties:
            RestApiId:
              Ref: ValidateTrackApi
            Path: /equipment/{id}
            Method: GET
        Create:
          Type: Api
          Properties:
            RestApiId:
              Ref: ValidateTrackApi
            Path: /equipment
            Method: POST
        Update:
          Type: Api
          Properties:
            RestApiId:
              Ref: ValidateTrackApi
            Path: /equipment/{id}
            Method: PUT
        Delete:
          Type: Api
          Properties:
            RestApiId:
              Ref: ValidateTrackApi
            Path: /equipment/{id}
            Method: DELETE
    Metadata:
      SamResourceId: EquipmentFunction
  DeviationsFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src/handlers/deviations.handler
      CodeUri: DeviationsFunction
      Policies:
      - DynamoDBCrudPolicy:
          TableName:
            Ref: DeviationsTable
      Events:
        GetAll:
          Type: Api
          Properties:
            RestApiId:
              Ref: ValidateTrackApi
            Path: /deviations
            Method: GET
        GetOne:
          Type: Api
          Properties:
            RestApiId:
              Ref: ValidateTrackApi
            Path: /deviations/{id}
            Method: GET
        Create:
          Type: Api
          Properties:
            RestApiId:
              Ref: ValidateTrackApi
            Path: /deviations
            Method: POST
        Update:
          Type: Api
          Properties:
            RestApiId:
              Ref: ValidateTrackApi
            Path: /deviations/{id}
            Method: PUT
        Delete:
          Type: Api
          Properties:
            RestApiId:
              Ref: ValidateTrackApi
            Path: /deviations/{id}
            Method: DELETE
    Metadata:
      SamResourceId: DeviationsFunction
Outputs:
  ValidateTrackApiUrl:
    Value:
      Fn::Sub: https://${ValidateTrackApi}.execute-api.${AWS::Region}.amazonaws.com/dev/
