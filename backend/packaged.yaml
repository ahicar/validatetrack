AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: ValidateTrack backend - API Gateway + Lambda + DynamoDB
Globals:
  Function:
    Runtime: nodejs24.x
    Timeout: 10
    MemorySize: 128
    Environment:
      Variables:
        EQUIPMENT_TABLE:
          Ref: EquipmentTable
        DEVIATIONS_TABLE:
          Ref: DeviationsTable
Resources:
  EquipmentTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: ValidateTrack-Equipment
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
      - AttributeName: id
        AttributeType: S
      KeySchema:
      - AttributeName: id
        KeyType: HASH
    Metadata:
      SamResourceId: EquipmentTable
  DeviationsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: ValidateTrack-Deviations
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
      - AttributeName: id
        AttributeType: S
      KeySchema:
      - AttributeName: id
        KeyType: HASH
    Metadata:
      SamResourceId: DeviationsTable
  ValidateTrackApi:
    Type: AWS::Serverless::Api
    Properties:
      StageName: dev
      Auth:
        ApiKeyRequired: true
      Cors:
        AllowMethods: '''GET,POST,PUT,DELETE,OPTIONS'''
        AllowHeaders: '''Content-Type'''
        AllowOrigin: '''*'''
    Metadata:
      SamResourceId: ValidateTrackApi
  ValidateTrackApiKey:
    Type: AWS::ApiGateway::ApiKey
    Properties:
      Name: ValidateTrack-ApiKey
      Enabled: true
      Value: local-dev-api-key
    Metadata:
      SamResourceId: ValidateTrackApiKey
  ValidateTrackUsagePlan:
    Type: AWS::ApiGateway::UsagePlan
    Properties:
      UsagePlanName: ValidateTrack-UsagePlan
      ApiStages:
      - ApiId:
          Ref: ValidateTrackApi
        Stage: dev
    Metadata:
      SamResourceId: ValidateTrackUsagePlan
  ValidateTrackUsagePlanKey:
    Type: AWS::ApiGateway::UsagePlanKey
    Properties:
      KeyId:
        Ref: ValidateTrackApiKey
      KeyType: API_KEY
      UsagePlanId:
        Ref: ValidateTrackUsagePlan
    Metadata:
      SamResourceId: ValidateTrackUsagePlanKey
  EquipmentFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src/handlers/equipment.handler
      CodeUri: s3://aws-sam-cli-managed-default-samclisourcebucket-vsh7r1kks3oz/75d2f3a7a65f27a92480f7467fac7826
      Policies:
      - DynamoDBCrudPolicy:
          TableName:
            Ref: EquipmentTable
      Events:
        GetAll:
          Type: Api
          Properties:
            RestApiId:
              Ref: ValidateTrackApi
            Path: /equipment
            Method: GET
        GetOne:
          Type: Api
          Properties:
            RestApiId:
              Ref: ValidateTrackApi
            Path: /equipment/{id}
            Method: GET
        Create:
          Type: Api
          Properties:
            RestApiId:
              Ref: ValidateTrackApi
            Path: /equipment
            Method: POST
        Update:
          Type: Api
          Properties:
            RestApiId:
              Ref: ValidateTrackApi
            Path: /equipment/{id}
            Method: PUT
        Delete:
          Type: Api
          Properties:
            RestApiId:
              Ref: ValidateTrackApi
            Path: /equipment/{id}
            Method: DELETE
    Metadata:
      SamResourceId: EquipmentFunction
  DeviationsFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src/handlers/deviations.handler
      CodeUri: s3://aws-sam-cli-managed-default-samclisourcebucket-vsh7r1kks3oz/75d2f3a7a65f27a92480f7467fac7826
      Policies:
      - DynamoDBCrudPolicy:
          TableName:
            Ref: DeviationsTable
      Events:
        GetAll:
          Type: Api
          Properties:
            RestApiId:
              Ref: ValidateTrackApi
            Path: /deviations
            Method: GET
        GetOne:
          Type: Api
          Properties:
            RestApiId:
              Ref: ValidateTrackApi
            Path: /deviations/{id}
            Method: GET
        Create:
          Type: Api
          Properties:
            RestApiId:
              Ref: ValidateTrackApi
            Path: /deviations
            Method: POST
        Update:
          Type: Api
          Properties:
            RestApiId:
              Ref: ValidateTrackApi
            Path: /deviations/{id}
            Method: PUT
        Delete:
          Type: Api
          Properties:
            RestApiId:
              Ref: ValidateTrackApi
            Path: /deviations/{id}
            Method: DELETE
    Metadata:
      SamResourceId: DeviationsFunction
  Outputs:
    ApiUrl:
      Value:
        Fn::Sub: https://${ValidateTrackApi}.execute-api.${AWS::Region}.amazonaws.com/dev/
    ApiKeyId:
      Value:
        Ref: ValidateTrackApiKey
    Metadata:
      SamResourceId: Outputs
