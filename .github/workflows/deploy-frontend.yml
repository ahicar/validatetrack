name: Deploy Frontend to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Use Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: |
          cd frontend
          npm ci

      - name: Build frontend
        run: |
          cd frontend
          npm run build

      - name: Inspect build output
        run: |
          echo "Node version: $(node -v)"
          ls -la frontend || true
          ls -la frontend/dist || true

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v3
        with:
          enablement: true

      - name: Upload artifact for GitHub Pages (actions/upload-artifact v4)
        uses: actions/upload-artifact@v4
        with:
          name: pages
          path: frontend/dist

      - name: Deploy to GitHub Pages (official)
        uses: actions/deploy-pages@v1
